apiVersion: v1
kind: Service
metadata:
  name: go-router
  labels: { app: tokensentinel, component: go-router }
spec:
  ports:
    - port: 8080
      targetPort: 8080
  selector: { app: tokensentinel, component: go-router }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-router
  labels: { app: tokensentinel, component: go-router }
spec:
  replicas: 2
  selector:
    matchLabels: { app: tokensentinel, component: go-router }
  template:
    metadata:
      labels: { app: tokensentinel, component: go-router }
    spec:
      containers:
        - name: go-router
          image: proxyops/go-router:latest
          ports:
            - containerPort: 8080
          env:
            - name: REDIS_ADDR
              value: "redis:6379"
          resources:
            requests: { cpu: "200m", memory: "128Mi" }
            limits: { cpu: "1", memory: "512Mi" }
