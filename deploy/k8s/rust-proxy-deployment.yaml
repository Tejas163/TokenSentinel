apiVersion: v1
kind: Service
metadata:
  name: rust-proxy
  labels: { app: tokensentinel, component: rust-proxy }
spec:
  ports:
    - port: 3000
      targetPort: 3000
  selector: { app: tokensentinel, component: rust-proxy }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rust-proxy
  labels: { app: tokensentinel, component: rust-proxy }
spec:
  replicas: 2
  selector:
    matchLabels: { app: tokensentinel, component: rust-proxy }
  template:
    metadata:
      labels: { app: tokensentinel, component: rust-proxy }
    spec:
      containers:
        - name: rust-proxy
          image: proxyops/rust-proxy:latest
          ports:
            - containerPort: 3000
          env:
            - name: REDIS_URL
              value: "redis://redis:6379"
            - name: GO_ROUTER_URL
              value: "http://go-router:8080"
          resources:
            requests: { cpu: "200m", memory: "128Mi" }
            limits: { cpu: "1", memory: "512Mi" }
