apiVersion: v1
kind: Service
metadata:
  name: cost-dashboard
  labels: { app: tokensentinel, component: cost-dashboard }
spec:
  ports:
    - port: 3001
      targetPort: 3001
  selector: { app: tokensentinel, component: cost-dashboard }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cost-dashboard
  labels: { app: tokensentinel, component: cost-dashboard }
spec:
  replicas: 1
  selector:
    matchLabels: { app: tokensentinel, component: cost-dashboard }
  template:
    metadata:
      labels: { app: tokensentinel, component: cost-dashboard }
    spec:
      containers:
        - name: cost-dashboard
          image: proxyops/cost-dashboard:latest
          ports:
            - containerPort: 3001
          env:
            - name: REDIS_ADDR
              value: "redis:6379"
            - name: SQLITE_PATH
              value: "/data/cost_dashboard.db"
          volumeMounts:
            - name: cost-data
              mountPath: /data
      volumes:
        - name: cost-data
          persistentVolumeClaim:
            claimName: cost-data-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cost-data-pvc
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
