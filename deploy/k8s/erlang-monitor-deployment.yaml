apiVersion: v1
kind: Service
metadata:
  name: erlang-monitor
  labels: { app: tokensentinel, component: erlang-monitor }
spec:
  ports:
    - port: 4000
      targetPort: 4000
  selector: { app: tokensentinel, component: erlang-monitor }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: erlang-monitor
  labels: { app: tokensentinel, component: erlang-monitor }
spec:
  replicas: 1
  selector:
    matchLabels: { app: tokensentinel, component: erlang-monitor }
  template:
    metadata:
      labels: { app: tokensentinel, component: erlang-monitor }
    spec:
      containers:
        - name: erlang-monitor
          image: proxyops/erlang-monitor:latest
          env:
            - name: REDIS_URL
              value: "redis://redis:6379"
          resources:
            requests: { cpu: "100m", memory: "64Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
