apiVersion: apps/v1
kind: Deployment
metadata:
  name: cost-dashboard
  namespace: tokensentinel
  labels:
    app: cost-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cost-dashboard
  template:
    metadata:
      labels:
        app: cost-dashboard
    spec:
      initContainers:
        - name: wait-for-redis
          image: redis:7-alpine
          command:
            - sh
            - -c
            - until redis-cli -h redis ping; do echo waiting for redis; sleep 2; done
        - name: wait-for-postgres
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - until pg_isready -h postgres -U postgres -d cost_dashboard; do echo waiting for postgres; sleep 2; done
          envFrom:
            - secretRef:
                name: tokensentinel-secrets
      containers:
        - name: cost-dashboard
          image: tokensentinel/cost-dashboard:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3001
          env:
            - name: REDIS_ADDR
              value: redis:6379
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: tokensentinel-secrets
                  key: DATABASE_URL
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector:4318
            - name: OTEL_SERVICE_NAME
              value: cost-dashboard
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: cost-dashboard
  namespace: tokensentinel
spec:
  selector:
    app: cost-dashboard
  ports:
    - name: http
      port: 3001
      targetPort: 3001
