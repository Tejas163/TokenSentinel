apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: tokensentinel
data:
  otel-collector-config.yml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    exporters:
      debug:
        verbosity: detailed
    service:
      pipelines:
        traces:
          receivers: [otlp]
          exporters: [debug]
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: seed-keys-script
  namespace: tokensentinel
data:
  seed-keys.sh: |
    #!/bin/sh
    REDIS_URL="${REDIS_URL:-redis://redis:6379}"
    echo "Seeding virtual API keys into $REDIS_URL ..."
    redis-cli -u "$REDIS_URL" HSET \
      apikey:dev-key-123 \
      name "Dev Key" \
      team "engineering" \
      status "active" \
      budget_monthly_cents "500000" \
      rate_limit_rps "100" \
      allowed_models '["*"]' \
      allowed_services '["proxy","mcp","dashboard"]' \
      created_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
    echo "Done. Key 'dev-key-123' seeded with team=engineering."
