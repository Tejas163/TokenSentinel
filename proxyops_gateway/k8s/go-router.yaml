apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-router
  namespace: tokensentinel
  labels:
    app: go-router
spec:
  replicas: 2
  selector:
    matchLabels:
      app: go-router
  template:
    metadata:
      labels:
        app: go-router
    spec:
      containers:
        - name: go-router
          image: tokensentinel/go-router:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: REDIS_ADDR
              value: redis:6379
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector:4318
            - name: OTEL_SERVICE_NAME
              value: go-router
            - name: SEMANTIC_CACHE_ENABLED
              value: "true"
            - name: SEMANTIC_CACHE_MODE
              value: embedding
            - name: SEMANTIC_CACHE_TTL
              value: 1h
            - name: EMBEDDING_API_URL
              value: http://embedding-service:1234/v1/embeddings
            - name: EMBEDDING_DIM
              value: "768"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: go-router
  namespace: tokensentinel
spec:
  selector:
    app: go-router
  ports:
    - name: http
      port: 8080
      targetPort: 8080
