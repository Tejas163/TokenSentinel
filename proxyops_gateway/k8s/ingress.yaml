apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tokensentinel
  namespace: tokensentinel
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: proxy.tokensentinel.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: rust-proxy
                port:
                  number: 3000
    - host: mcp.tokensentinel.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mcp-gateway
                port:
                  number: 3010
    - host: dashboard.tokensentinel.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cost-dashboard
                port:
                  number: 3001
