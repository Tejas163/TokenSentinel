apiVersion: batch/v1
kind: Job
metadata:
  name: init-keys
  namespace: tokensentinel
  labels:
    app: init-keys
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: init-keys
          image: redis:7-alpine
          env:
            - name: REDIS_URL
              value: redis://redis:6379
          command: ["sh", "/seed-keys.sh"]
          volumeMounts:
            - name: script
              mountPath: /seed-keys.sh
              subPath: seed-keys.sh
      volumes:
        - name: script
          configMap:
            name: seed-keys-script
            defaultMode: 0755
