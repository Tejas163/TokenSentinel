apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-gateway
  namespace: tokensentinel
  labels:
    app: mcp-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-gateway
  template:
    metadata:
      labels:
        app: mcp-gateway
    spec:
      containers:
        - name: mcp-gateway
          image: tokensentinel/mcp-gateway:latest
          imagePullPolicy: Always
          ports:
            - name: sse
              containerPort: 3010
            - name: message
              containerPort: 3011
          env:
            - name: REDIS_URL
              value: redis://redis:6379
            - name: DASHBOARD_URL
              value: http://cost-dashboard:3001
            - name: DASHBOARD_API_KEY
              valueFrom:
                secretKeyRef:
                  name: tokensentinel-secrets
                  key: DASHBOARD_API_KEY
            - name: MCP_API_KEY
              valueFrom:
                secretKeyRef:
                  name: tokensentinel-secrets
                  key: MCP_API_KEY
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector:4317
            - name: OTEL_SERVICE_NAME
              value: mcp-gateway
          livenessProbe:
            httpGet:
              path: /health
              port: 3010
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3010
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-gateway
  namespace: tokensentinel
spec:
  selector:
    app: mcp-gateway
  ports:
    - name: sse
      port: 3010
      targetPort: 3010
    - name: message
      port: 3011
      targetPort: 3011
