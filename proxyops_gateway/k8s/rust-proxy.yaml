apiVersion: apps/v1
kind: Deployment
metadata:
  name: rust-proxy
  namespace: tokensentinel
  labels:
    app: rust-proxy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rust-proxy
  template:
    metadata:
      labels:
        app: rust-proxy
    spec:
      containers:
        - name: rust-proxy
          image: tokensentinel/rust-proxy:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: REDIS_URL
              value: redis://redis:6379
            - name: GO_ROUTER_URL
              value: http://go-router:8080
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector:4317
            - name: OTEL_SERVICE_NAME
              value: rust-proxy
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: rust-proxy
  namespace: tokensentinel
spec:
  selector:
    app: rust-proxy
  ports:
    - name: http
      port: 3000
      targetPort: 3000
