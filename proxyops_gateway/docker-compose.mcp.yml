services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: cost_dashboard
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cost_dashboard"]
      interval: 3s
      timeout: 3s
      retries: 5
    volumes:
      - mcp-pg-data:/var/lib/postgresql/data
    restart: unless-stopped

  init-keys:
    image: redis:7-alpine
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./scripts/seed-keys.sh:/seed-keys.sh:ro
    command: sh /seed-keys.sh
    restart: no

  cost-dashboard:
    build: ./cost-dashboard
    ports:
      - "3001:3001"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      init-keys:
        condition: service_completed_successfully
    environment:
      - REDIS_ADDR=redis:6379
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/cost_dashboard?sslmode=disable
    restart: unless-stopped

  mcp-server:
    build: ./mcp-gateway
    ports:
      - "3010:3010"
    depends_on:
      redis:
        condition: service_healthy
      cost-dashboard:
        condition: service_started
      init-keys:
        condition: service_completed_successfully
    environment:
      - MCP_API_KEY=dev-key-123
      - DASHBOARD_URL=http://cost-dashboard:3001
      - DASHBOARD_API_KEY=dev-key-123
      - REDIS_URL=redis://redis:6379
    restart: unless-stopped

volumes:
  mcp-pg-data:
