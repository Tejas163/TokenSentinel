services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=cost_dashboard
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cost_dashboard"]
      interval: 3s
      timeout: 3s
      retries: 5
    volumes:
      - pg-data:/var/lib/postgresql/data
    restart: unless-stopped

  rust-proxy:
    build: ./rust-proxy
    ports:
      - "3000:3000"
    depends_on:
      - redis
      - go-router
    environment:
      - REDIS_URL=redis://redis:6379
      - GO_ROUTER_URL=http://go-router:8080
    restart: unless-stopped

  go-router:
    build: ./go-router
    ports:
      - "8080:8080"
    depends_on:
      - redis
    environment:
      - REDIS_ADDR=redis:6379
      - AUTH_API_KEY=dev-key-123
    restart: unless-stopped

  cost-dashboard:
    build:
      context: .
      dockerfile: ./cost-dashboard/Dockerfile
    ports:
      - "3001:3001"
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
    environment:
      - REDIS_ADDR=redis:6379
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/cost_dashboard?sslmode=disable
      - AUTH_API_KEY=dev-key-123
    restart: unless-stopped

  mcp-gateway:
    build: ./mcp-gateway
    ports:
      - "3010:3010"
      - "3011:3011"
    depends_on:
      - redis
      - cost-dashboard
    environment:
      - REDIS_URL=redis://redis:6379
      - DASHBOARD_URL=http://cost-dashboard:3001
      - DASHBOARD_API_KEY=dev-key-123
      - MCP_API_KEY=dev-key-123
    restart: unless-stopped

volumes:
  pg-data:
