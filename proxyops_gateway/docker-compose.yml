services:
  redis:
    image: redis/redis-stack-server:7.2.0-v11
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=cost_dashboard
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cost_dashboard"]
      interval: 3s
      timeout: 3s
      retries: 5
    volumes:
      - pg-data:/var/lib/postgresql/data
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.121.0
    command: ["--config=/etc/otel-collector-config.yml"]
    ports:
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./otel-collector-config.yml:/etc/otel-collector-config.yml:ro
    restart: unless-stopped

  init-keys:
    image: redis:7-alpine
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./scripts/seed-keys.sh:/seed-keys.sh:ro
    command: sh /seed-keys.sh
    restart: no

  rust-proxy:
    build: ./rust-proxy
    ports:
      - "3000:3000"
    depends_on:
      redis:
        condition: service_healthy
      otel-collector:
        condition: service_started
      init-keys:
        condition: service_completed_successfully
    environment:
      - REDIS_URL=redis://redis:6379
      - GO_ROUTER_URL=http://go-router:8080
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=rust-proxy
    restart: unless-stopped

  go-router:
    build: ./go-router
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
      otel-collector:
        condition: service_started
      init-keys:
        condition: service_completed_successfully
    environment:
      - REDIS_ADDR=redis:6379
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_SERVICE_NAME=go-router
      - SEMANTIC_CACHE_ENABLED=true
      - SEMANTIC_CACHE_MODE=embedding
      - SEMANTIC_CACHE_TTL=1h
      - EMBEDDING_API_URL=http://host.docker.internal:1234/v1/embeddings
      - EMBEDDING_API_KEY=
      - EMBEDDING_DIM=768
    restart: unless-stopped

  cost-dashboard:
    build:
      context: .
      dockerfile: ./cost-dashboard/Dockerfile
    ports:
      - "3001:3001"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      otel-collector:
        condition: service_started
      init-keys:
        condition: service_completed_successfully
    environment:
      - REDIS_ADDR=redis:6379
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/cost_dashboard?sslmode=disable
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_SERVICE_NAME=cost-dashboard
    restart: unless-stopped

  mcp-gateway:
    build: ./mcp-gateway
    ports:
      - "3010:3010"
      - "3011:3011"
    depends_on:
      redis:
        condition: service_healthy
      cost-dashboard:
        condition: service_started
      otel-collector:
        condition: service_started
      init-keys:
        condition: service_completed_successfully
    environment:
      - REDIS_URL=redis://redis:6379
      - DASHBOARD_URL=http://cost-dashboard:3001
      - DASHBOARD_API_KEY=dev-key-123
      - MCP_API_KEY=dev-key-123
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=mcp-gateway
    restart: unless-stopped

  evolunet-slm:
    build:
      context: ../evolunet_slm
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      otel-collector:
        condition: service_started
    environment:
      - EVOLUNET_PORT=8000
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_SERVICE_NAME=evolunet-slm
    volumes:
      - evolunet-models:/app/models
    restart: unless-stopped

volumes:
  pg-data:
  evolunet-models:
