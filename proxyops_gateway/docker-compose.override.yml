services:
  rust-proxy:
    image: tokensentinel/rust-proxy:latest
    build: ./rust-proxy

  go-router:
    image: tokensentinel/go-router:latest
    build: ./go-router

  cost-dashboard:
    image: tokensentinel/cost-dashboard:latest
    build:
      context: .
      dockerfile: ./cost-dashboard/Dockerfile

  mcp-gateway:
    image: tokensentinel/mcp-gateway:latest
    build: ./mcp-gateway

  evolunet-slm:
    image: tokensentinel/evolunet-slm:latest
    build:
      context: ../evolunet_slm
      dockerfile: Dockerfile
