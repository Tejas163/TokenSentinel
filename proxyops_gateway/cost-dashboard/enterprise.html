<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enterprise Inquiry — TokenSentinel</title>
<link rel="stylesheet" href="/static/styles.css">
<style>
  body { padding: 0; }
  .container { max-width: 720px; margin: 0 auto; padding: 0 2rem; }

  nav { display: flex; justify-content: space-between; align-items: center; padding: 1.25rem 2rem; border-bottom: 1px solid #1e293b; max-width: 1140px; margin: 0 auto; }
  nav .logo { font-size: 1.35rem; font-weight: 700; color: #38bdf8; letter-spacing: -0.02em; }
  nav .logo span { color: #64748b; font-weight: 400; }
  nav a { color: #94a3b8; text-decoration: none; font-size: 0.9rem; }
  nav a:hover { color: #f8fafc; }

  .form-section { padding: 4rem 0; }
  .form-section h1 { font-size: 2rem; font-weight: 700; color: #f8fafc; margin-bottom: 0.5rem; }
  .form-section .sub { color: #64748b; margin-bottom: 2.5rem; }

  .form-group { margin-bottom: 1.5rem; }
  .form-group label { display: block; font-size: 0.875rem; font-weight: 600; color: #e2e8f0; margin-bottom: 0.4rem; }
  .form-group label .req { color: #ef4444; }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%; padding: 0.7rem 0.9rem; border-radius: 6px; border: 1px solid #334155;
    background: #1e293b; color: #f8fafc; font-size: 0.9rem; box-sizing: border-box;
    transition: border-color 0.15s;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    outline: none; border-color: #38bdf8;
  }
  .form-group textarea { min-height: 120px; resize: vertical; }
  .form-group .hint { font-size: 0.8rem; color: #64748b; margin-top: 0.3rem; }

  .btn-submit { background: #38bdf8; color: #0f172a; padding: 0.75rem 2.5rem; border-radius: 8px;
    font-weight: 600; font-size: 1rem; border: none; cursor: pointer; transition: background 0.15s; }
  .btn-submit:hover { background: #7dd3fc; }
  .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

  .success-box { background: #064e3b; border: 1px solid #22c55e; border-radius: 8px; padding: 2rem;
    text-align: center; margin-top: 2rem; }
  .success-box h2 { color: #22c55e; margin-bottom: 0.5rem; }
  .success-box p { color: #94a3b8; }

  .error-msg { color: #f87171; font-size: 0.85rem; margin-top: 0.3rem; display: none; }

  footer { border-top: 1px solid #1e293b; padding: 2.5rem 0; text-align: center; margin-top: 3rem; }
  footer p { font-size: 0.85rem; color: #475569; }
  footer a { color: #64748b; text-decoration: none; font-size: 0.85rem; }
  footer a:hover { color: #94a3b8; }
</style>
</head>
<body>
<nav>
  <div class="logo">TokenSentinel <span>| LLM Cost Governance</span></div>
  <a href="/">&larr; Back to Home</a>
</nav>

<section class="form-section">
  <div class="container">
    <h1>Enterprise Inquiry</h1>
    <p class="sub">Tell us about your needs and we'll get back to you within 1 business day.</p>

    <div id="success" style="display:none;">
      <div class="success-box">
        <h2>Thank you!</h2>
        <p>Your inquiry has been submitted. Our enterprise team will contact you shortly.</p>
        <p style="margin-top:1.5rem;"><a href="/" class="btn-submit" style="text-decoration:none;display:inline-block;">Back to Home</a></p>
      </div>
    </div>

    <form id="inquiry-form">
      <div class="form-group">
        <label>Full Name <span class="req">*</span></label>
        <input type="text" name="name" required>
      </div>
      <div class="form-group">
        <label>Work Email <span class="req">*</span></label>
        <input type="email" name="email" required>
      </div>
      <div class="form-group">
        <label>Company Name <span class="req">*</span></label>
        <input type="text" name="company" required>
      </div>
      <div class="form-group">
        <label>Phone</label>
        <input type="tel" name="phone" placeholder="+1 (555) 123-4567">
      </div>
      <div class="form-group">
        <label>Deployment Preference</label>
        <select name="deployment">
          <option value="">— Select —</option>
          <option value="cloud">Managed Cloud</option>
          <option value="on-premise">On-Premise</option>
          <option value="hybrid">Hybrid</option>
          <option value="not-sure">Not Sure Yet</option>
        </select>
      </div>
      <div class="form-group">
        <label>Monthly LLM Call Volume</label>
        <select name="volume">
          <option value="">— Select —</option>
          <option value="<1M">&lt; 1M</option>
          <option value="1M-10M">1M – 10M</option>
          <option value="10M-100M">10M – 100M</option>
          <option value="100M+">100M+</option>
        </select>
      </div>
      <div class="form-group">
        <label>Models Used</label>
        <input type="text" name="models" placeholder="e.g. GPT-4, Claude 3, Llama 3">
      </div>
      <div class="form-group">
        <label>Message</label>
        <textarea name="message" placeholder="Tell us about your use case, compliance needs, or any specific requirements..."></textarea>
      </div>
      <button type="submit" class="btn-submit" id="submit-btn">Submit Inquiry</button>
    </form>
  </div>
</section>

<footer>
  <p>TokenSentinel &mdash; Apache 2.0 License</p>
</footer>

<script>
document.getElementById('inquiry-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = 'Submitting...';

  const data = {};
  new FormData(this).forEach((v, k) => data[k] = v);

  try {
    const resp = await fetch('/api/enterprise/inquiry', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data),
    });
    if (!resp.ok) throw new Error(await resp.text());
    document.getElementById('inquiry-form').style.display = 'none';
    document.getElementById('success').style.display = 'block';
  } catch (err) {
    alert('Submission failed: ' + err.message);
    btn.disabled = false;
    btn.textContent = 'Submit Inquiry';
  }
});
</script>
</body>
</html>
