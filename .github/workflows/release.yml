name: Release

on:
  push:
    tags: ["v*.*.*"]

jobs:
  build:
    name: Build Binaries
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            ext: ""
          - os: macos-latest
            goos: darwin
            goarch: amd64
            ext: ""
          - os: windows-latest
            goos: windows
            goarch: amd64
            ext: ".exe"
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@78961f6f84d799cd858575bb931c3e51d3b13290 # v5
        with:
          go-version: "1.25"
      - name: Build
        run: go build -ldflags="-s -w" -o tokensentinel-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} .
      - name: Test
        run: go test ./...
      - uses: actions/upload-artifact@5d5d22a31266ced268874388b861e4b58bb5c2f3 # v4
        with:
          name: tokensentinel-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
          path: app/tokensentinel-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}

  create-release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - - uses: actions/download-artifact@v4
        with:
          pattern: tokensentinel-*
          path: artifacts
          merge-multiple: true
      - name: Display structure
        run: ls -la artifacts/
      - name: Generate release notes
        run: |
          echo "## TokenSentinel ${{ github.ref_name }}" > release-notes.md
          echo "" >> release-notes.md
          echo "### Downloads" >> release-notes.md
          echo "" >> release-notes.md
          echo "- **Linux** (amd64): \`tokensentinel-linux-amd64\`" >> release-notes.md
          echo "- **macOS** (amd64): \`tokensentinel-darwin-amd64\`" >> release-notes.md
          echo "- **Windows** (amd64): \`tokensentinel-windows-amd64.exe\`" >> release-notes.md
          echo "" >> release-notes.md
          echo "### Quick Start" >> release-notes.md
          echo "" >> release-notes.md
          echo '```bash' >> release-notes.md
          echo '# Linux/macOS' >> release-notes.md
          echo 'chmod +x tokensentinel-linux-amd64' >> release-notes.md
          echo './tokensentinel-linux-amd64' >> release-notes.md
          echo '```' >> release-notes.md
          echo "" >> release-notes.md
          echo "Then open http://localhost:8080, upload your billing CSV, and get your report." >> release-notes.md
      - uses: softprops/action-gh-release@01570a1f39cb168c169c802c3bceb9e93fb10974 # v2
        with:
          files: artifacts/*
          body_path: release-notes.md
          draft: true
